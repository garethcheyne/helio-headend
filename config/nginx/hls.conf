server {
    listen 8080;
    server_name _;

    location /hls/ {
        root /var/www/html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
            text/plain m3u;
        }
    }
}
