# /etc/nginx/sites-available/helio-stream-ui  (symlink into sites-enabled)
# Internet-facing reverse proxy for the dashboard + same-origin HTTPS HLS.
# Replace tv.example.com with your real domain and run certbot for the cert.

upstream helio_stream_ui {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- HTTP: ACME challenge + redirect to HTTPS --------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name tv.example.com;                       # TODO

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: dashboard + HLS, single origin -----------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tv.example.com;                       # TODO

    ssl_certificate     /etc/letsencrypt/live/tv.example.com/fullchain.pem;   # TODO
    ssl_certificate_key /etc/letsencrypt/live/tv.example.com/privkey.pem;     # TODO
    ssl_protocols TLSv1.2 TLSv1.3;

    # Larger HLS segments / long-poll friendliness
    client_max_body_size 8m;

    # DVB-T HLS, served straight from disk on the SAME origin (no mixed content).
    location /hls/ {
        root /var/www/html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }
    }

    # --- Admin / internal surface: LAN ONLY ----------------------------------
    # Login, the admin area, auth, stream management and the monitoring APIs are
    # only reachable from the local network. Public visitors get 403.
    # (Public keeps: /, /api/channels, /api/playlist.m3u8, /hls/, /_next/ ...)
    location ~ ^/(login|admin|api/auth|api/streams|api/health|api/tuner) {
        allow 192.168.0.0/24;       # your LAN
        allow 127.0.0.1;            # on-box (cron, localhost)
        # allow 10.0.0.0/8;         # uncomment for other private ranges
        # allow 172.16.0.0/12;
        deny all;

        proxy_pass http://helio_stream_ui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → the Next.js app (public).
    location / {
        proxy_pass http://helio_stream_ui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# NOTE: do NOT add proxy locations for TVHeadend (:9981), the packager (:121),
# or :9982 — those stay LAN-only. The app reaches them server-side over the LAN.
