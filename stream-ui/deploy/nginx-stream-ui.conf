# /etc/nginx/sites-available/helio-stream-ui  (symlink into sites-enabled)
# Single-port HTTPS: serves the dashboard + HLS on :8080 (no 80/443).
# Replace stream.err403.com with your domain and point at your cert.
#
# IMPORTANT: this REPLACES the old plain-HTTP :8080 HLS server
# (config/nginx/hls.conf). Disable that site first or nginx will refuse two
# servers on the same port:
#     sudo rm -f /etc/nginx/sites-enabled/hls

upstream helio_stream_ui {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 8080 ssl;
    listen [::]:8080 ssl;
    http2 on;
    server_name stream.err403.com;                # TODO

    ssl_certificate     /etc/letsencrypt/live/stream.err403.com/fullchain.pem;  # TODO
    ssl_certificate_key /etc/letsencrypt/live/stream.err403.com/privkey.pem;    # TODO
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 8m;

    # DVB-T HLS, served straight from disk on the SAME origin (:8080).
    location /hls/ {
        root /var/www/html;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }
    }

    # --- Admin / internal surface: LAN ONLY ----------------------------------
    location ~ ^/(login|admin|api/auth|api/streams|api/health|api/tuner) {
        allow 192.168.0.0/24;       # your LAN
        allow 127.0.0.1;            # on-box (cron, localhost)
        deny all;

        proxy_pass http://helio_stream_ui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else → the Next.js app (public).
    location / {
        proxy_pass http://helio_stream_ui;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# NOTE: TVHeadend (:9981/:9982) and the packager stay LAN-only — never proxied.
